<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de Monitoramento — Sentinel IA</title>
  <meta name="description" content="Mapa interativo de monitoramento urbano com camadas de criminalidade, trânsito, clima e saúde.">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <!-- Page-specific inline styles for map popups & overlays -->
  <style>
    /* Full-height map override */
    .map-page-wrapper {
      position: relative;
      width: 100%;
      height: calc(100vh - 60px);
    }

    /* Custom Leaflet popup styling (dark theme) */
    .leaflet-popup-content-wrapper {
      background: rgba(6, 10, 20, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: var(--text-primary);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      padding: 0;
    }

    .leaflet-popup-content {
      margin: 0;
      font-family: var(--font-main);
      font-size: 0.85rem;
      line-height: 1.5;
      min-width: 220px;
    }

    .leaflet-popup-tip {
      background: rgba(6, 10, 20, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-top: none;
      border-left: none;
    }

    .leaflet-popup-close-button {
      color: var(--text-tertiary) !important;
      font-size: 18px !important;
      top: 8px !important;
      right: 10px !important;
    }

    .leaflet-popup-close-button:hover {
      color: var(--text-primary) !important;
    }

    /* Popup inner layout */
    .popup-card {
      padding: 1rem 1.15rem;
    }

    .popup-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .popup-severity {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .popup-severity.critical { background: #ef4444; box-shadow: 0 0 8px rgba(239, 68, 68, 0.6); }
    .popup-severity.warning  { background: #f59e0b; box-shadow: 0 0 8px rgba(245, 158, 11, 0.6); }
    .popup-severity.info     { background: #3b82f6; box-shadow: 0 0 8px rgba(59, 130, 246, 0.6); }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    .popup-title {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-primary);
    }

    .popup-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.25rem 0;
    }

    .popup-label {
      color: var(--text-tertiary);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .popup-value {
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-weight: 500;
    }

    .popup-value.mono {
      font-family: var(--font-mono);
      font-size: 0.75rem;
    }

    .popup-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .popup-badge.critical { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .popup-badge.warning  { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .popup-badge.info     { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }

    /* Leaflet zoom controls */
    .leaflet-control-zoom a {
      background: rgba(6, 10, 20, 0.9) !important;
      color: var(--text-primary) !important;
      border-color: rgba(255, 255, 255, 0.08) !important;
      backdrop-filter: blur(12px);
    }

    .leaflet-control-zoom a:hover {
      background: rgba(17, 26, 46, 0.95) !important;
      color: var(--cyan) !important;
    }

    .leaflet-control-attribution {
      background: rgba(6, 10, 20, 0.7) !important;
      color: var(--text-tertiary) !important;
      font-size: 0.65rem !important;
    }

    .leaflet-control-attribution a {
      color: var(--text-tertiary) !important;
    }

    /* Layer color indicators */
    .layer-color-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .layer-color-dot.crime   { background: #ef4444; }
    .layer-color-dot.traffic { background: #f59e0b; }
    .layer-color-dot.climate { background: #3b82f6; }
    .layer-color-dot.health  { background: #10b981; }
    .layer-color-dot.infra   { background: #a855f7; }

    /* Map info panel responsive */
    @media (max-width: 768px) {
      .map-info-panel {
        left: var(--space-sm) !important;
        right: var(--space-sm) !important;
        bottom: var(--space-sm) !important;
        gap: var(--space-md) !important;
        flex-wrap: wrap;
        justify-content: center;
      }

      .map-overlay {
        top: var(--space-sm) !important;
        right: var(--space-sm) !important;
      }

      .map-layer-toggle {
        min-width: 170px !important;
      }

      .map-info-item .value {
        font-size: 1rem !important;
      }
    }

    /* Pulse animation for live dot */
    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: live-pulse 1.5s ease-in-out infinite;
    }

    @keyframes live-pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5); }
      50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
    }
  </style>
</head>
<body>

  <div class="dashboard-layout">
    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-icon">
          <i data-lucide="shield-check"></i>
        </div>
        <div>
          <h3>Sentinel <span style="color: var(--cyan);">IA</span></h3>
          <span>Inteligência Preditiva</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <span class="sidebar-section-label">Principal</span>

        <a href="dashboard.html" class="sidebar-link">
          <i data-lucide="layout-dashboard"></i>
          Dashboard
        </a>

        <a href="mapa.html" class="sidebar-link active">
          <i data-lucide="map"></i>
          Mapa
        </a>

        <a href="analise.html" class="sidebar-link">
          <i data-lucide="brain"></i>
          Análise
        </a>

        <a href="alertas.html" class="sidebar-link">
          <i data-lucide="bell"></i>
          Alertas
          <span class="link-badge">7</span>
        </a>

        <span class="sidebar-section-label">Sistema</span>

        <a href="index.html" class="sidebar-link">
          <i data-lucide="home"></i>
          Página Inicial
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-status">
          <div class="live-dot"></div>
          <span>Sistema Operacional</span>
        </div>
      </div>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="dashboard-main">
      <!-- Topbar -->
      <header class="dashboard-topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle-btn" id="sidebarToggle">
            <i data-lucide="menu"></i>
          </button>
          <div>
            <h2>Mapa de Monitoramento</h2>
            <p>Visualização geoespacial em tempo real</p>
          </div>
        </div>
        <div class="topbar-right">
          <div class="live-indicator">
            <div class="live-dot"></div>
            Ao vivo
          </div>
          <div class="topbar-time" id="topbarTime">--:--:--</div>
        </div>
      </header>

      <!-- Map Container (full height) -->
      <div class="map-page-wrapper">
        <div id="mainMap" style="width: 100%; height: 100%; z-index: 1;"></div>

        <!-- Layer Toggle Overlay (top-right) -->
        <div class="map-overlay">
          <div class="map-layer-toggle">
            <h5>Camadas de Dados</h5>

            <label class="map-layer-item">
              <input type="checkbox" id="layerCrime" checked>
              <span class="layer-color-dot crime"></span>
              Criminalidade
            </label>

            <label class="map-layer-item">
              <input type="checkbox" id="layerTraffic" checked>
              <span class="layer-color-dot traffic"></span>
              Trânsito
            </label>

            <label class="map-layer-item">
              <input type="checkbox" id="layerClimate">
              <span class="layer-color-dot climate"></span>
              Clima
            </label>

            <label class="map-layer-item">
              <input type="checkbox" id="layerHealth">
              <span class="layer-color-dot health"></span>
              Saúde
            </label>

            <label class="map-layer-item">
              <input type="checkbox" id="layerInfra">
              <span class="layer-color-dot infra"></span>
              Infraestrutura
            </label>
          </div>
        </div>

        <!-- Info Panel (bottom-left) -->
        <div class="map-info-panel" id="mapInfoPanel">
          <div class="map-info-item">
            <div class="value" id="statOcorrencias">234</div>
            <div class="label">Ocorrências</div>
          </div>
          <div class="map-info-item">
            <div class="value" id="statZonas" style="color: var(--red);">12</div>
            <div class="label">Zonas Críticas</div>
          </div>
          <div class="map-info-item">
            <div class="value" id="statCameras" style="color: var(--cyan);">1.847</div>
            <div class="label">Câmeras Ativas</div>
          </div>
          <div class="map-info-item">
            <div class="value" id="statSensores" style="color: var(--green);">3.421</div>
            <div class="label">Sensores IoT</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="js/mapa.js"></script>
</body>
</html>
